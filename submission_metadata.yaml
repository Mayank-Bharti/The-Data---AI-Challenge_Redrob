ai_usage_summary: |
  Used Gemini to architect the decoupled HDE-CM pipeline, write the Python scripts (precompute.py and ranker.py), and format the README. No candidate data was fed to any LLM APIs during runtime.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  The HDE-CM (Hybrid Dual-Encoder with Career Momentum) architecture strictly decouples heavy deep-learning from live inference to beat the 5-minute constraint. Offline, we parse 100,000 JSON profiles, run them through a custom Truth-Check Matrix to instantly drop chronological 'honeypot' anomalies, and generate dense mathematical vectors using a local HuggingFace Sentence-Transformer (all-MiniLM-L6-v2), caching the results to a .pkl database. Online, the ranker script loads the vector cache into RAM and performs highly optimized NumPy Cosine Similarity calculations against the embedded Job Description. The base semantic score is then multiplied by Career Momentum heuristics (e.g., boosting active GitHub coders, exponentially decaying inactive profiles). Finally, it dynamically outputs the Top 100 leaderboard with human-readable XAI reasoning sentences. Runtime is 5.7 seconds for 43k+ viable candidates on a local CPU.

